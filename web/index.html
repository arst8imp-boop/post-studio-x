<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post Studio X</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    Post Studio X
    <span id="reply-counter" class="reply-counter" title="本日（JST）に生成したリプライ+会話リプの数">本日のリプ <b id="reply-counter-num">0</b></span>
    <span id="cost-counter" class="reply-counter" style="cursor:pointer" title="クリックで使用量の詳細を表示">今月のAPI課金 <b id="cost-counter-num">¥0</b></span>
  </div>
  <div class="actions">
    <button id="add-pane-h" title="ペイン追加">ペイン追加</button>
    <button id="open-batch" title="テーマが入っている全ペインを並列実行" class="primary">まとめて生成</button>
    <button id="open-buzz" title="バズ中のポストから引用先をピックアップ">バズ</button>
    <button id="open-ideas" title="投稿ネタ（テーマ・指示）をAIが提案">ネタ出し</button>
    <button id="open-history" title="生成履歴">履歴</button>
    <button id="open-accounts" title="アカウントの新規作成・名前変更">アカウント</button>
    <button id="clear-all" class="ghost" title="全ペインを閉じる">クリア</button>
  </div>
</header>
<main id="workspace" class="layout-grid"></main>

<!-- ペインテンプレ -->
<template id="pane-template">
  <section class="pane" data-pane>
    <header class="pane-head">
      <div class="pane-title">
        <select data-field="brand" class="select-brand">
          <option value="sheep">しーぷ</option>
          <option value="umai">馬井</option>
          <option value="taro">タロ</option>
        </select>
        <select data-field="type" class="select-type">
          <option value="long_post">長文ポスト</option>
          <option value="short_post">短文ポスト</option>
          <option value="quote_post">引用ポスト</option>
          <option value="reply_post">リプライ</option>
          <option value="thread_reply">会話リプ（流れ継続）</option>
          <option value="x_article">X記事（長文）</option>
        </select>
        <label class="chk" title="過去ポストを参考にする（RAG）">
          <input type="checkbox" data-field="use_rag" checked> RAG
        </label>
      </div>
      <div class="pane-actions">
        <button data-action="close" title="このペインを閉じる" class="close">×</button>
      </div>
    </header>
    <div class="pane-body">
      <textarea data-field="theme" placeholder="テーマ・指示（Cmd+Enterで生成）&#10;例：『初めての100円が動いた日』を長文で。引用・リプを呼ぶ構造で。" rows="3"></textarea>
      <textarea data-field="extra" placeholder="追加の細かい指示があれば（任意）" rows="2"></textarea>
      <div class="pane-controls">
        <button data-action="generate" class="primary">生成</button>
        <button data-action="copy" class="copy" disabled>コピー</button>
        <button data-action="cover" class="cover-btn" disabled hidden>カバー</button>
        <span data-field="status" class="status"></span>
      </div>
      <div data-field="output" class="output"></div>
      <div data-field="cover-preview" class="cover-preview" hidden></div>
    </div>
  </section>
</template>

<!-- 履歴モーダル -->
<div id="history-modal" class="modal" hidden>
  <div class="modal-backdrop" data-modal-close="history"></div>
  <div class="modal-body">
    <header class="modal-head">
      <h2>生成履歴</h2>
      <div class="modal-actions">
        <select id="history-brand-filter">
          <option value="">すべてのブランド</option>
          <option value="sheep">しーぷ</option>
          <option value="umai">馬井</option>
          <option value="taro">タロ</option>
        </select>
        <button type="button" id="history-refresh">更新</button>
        <button type="button" class="close" data-modal-close="history" aria-label="閉じる">×</button>
      </div>
    </header>
    <div id="history-list" class="history-list"></div>
  </div>
</div>

<!-- ネタ出しモーダル -->
<div id="ideas-modal" class="modal" hidden>
  <div class="modal-backdrop" data-modal-close="ideas"></div>
  <div class="modal-body">
    <header class="modal-head">
      <h2>ネタ出し（テーマ・指示の提案）</h2>
      <div class="modal-actions">
        <select id="ideas-brand">
          <option value="taro">タロ</option>
          <option value="sheep">しーぷ</option>
          <option value="umai">馬井</option>
        </select>
        <select id="ideas-count" title="提案する本数">
          <option value="5">5本</option>
          <option value="10" selected>10本</option>
          <option value="15">15本</option>
        </select>
        <button type="button" id="ideas-run" class="primary">生成</button>
        <button type="button" class="close" data-modal-close="ideas" aria-label="閉じる">×</button>
      </div>
    </header>
    <div style="padding:14px 20px; overflow-y:auto; font-size:13.5px; flex:1; min-height:0">
      <div id="ideas-status" style="color:var(--muted,#888)">
        アカウントの発信ジャンルと過去の生成履歴を踏まえて、まだ書いていない投稿ネタを提案します。
        気に入ったネタは「ペインに流す」でそのまま生成に使えます。
      </div>
      <div id="ideas-results"></div>
    </div>
  </div>
</div>

<!-- アカウント管理モーダル（新規作成・名前変更） -->
<div id="accounts-modal" class="modal" hidden>
  <div class="modal-backdrop" data-modal-close="accounts"></div>
  <div class="modal-body">
    <header class="modal-head">
      <h2>アカウント管理</h2>
      <div class="modal-actions">
        <button type="button" class="close" data-modal-close="accounts" aria-label="閉じる">×</button>
      </div>
    </header>
    <div style="padding:16px 20px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; font-size:13.5px">
      <div style="color:var(--muted,#888)">
        Xアカウント（ブランド）を新しく作れます。作成したアカウントはペインのプルダウンから選んで生成に使えます。
        組み込みの3アカウント（タロ / しーぷ / 馬井）は削除・名前変更はできませんが、「非表示」で一覧から隠せます（いつでも再表示できます）。
      </div>
      <label style="display:flex; flex-direction:column; gap:6px">
        <b>新規アカウントを作成</b>
        <div style="display:flex; gap:8px; align-items:center">
          <input id="account-new-name" type="text" placeholder="表示名（例: ケン / スロ助）" style="flex:1">
          <button type="button" id="account-create" class="primary">作成</button>
        </div>
      </label>
      <div id="account-list" style="display:flex; flex-direction:column; gap:16px"></div>
      <span id="account-status" style="color:var(--muted,#888)"></span>
    </div>
  </div>
</div>

<!-- 使用量モーダル -->
<div id="usage-modal" class="modal" hidden>
  <div class="modal-backdrop" data-modal-close="usage"></div>
  <div class="modal-body">
    <header class="modal-head">
      <h2>使用量とコスト</h2>
      <div class="modal-actions">
        <button type="button" id="usage-refresh">更新</button>
        <button type="button" class="close" data-modal-close="usage" aria-label="閉じる">×</button>
      </div>
    </header>
    <div id="usage-detail" style="padding:16px 20px; overflow-y:auto; line-height:1.7"></div>
  </div>
</div>

<!-- カバー画像はモーダル不要（ボタン押下で自動抽出→生成→自動DL） -->

<!-- バズピックアップモーダル -->
<div id="buzz-modal" class="modal" hidden>
  <div class="modal-backdrop" data-modal-close="buzz"></div>
  <div class="modal-body">
    <header class="modal-head">
      <h2>バズピックアップ</h2>
      <div class="modal-actions">
        <select id="buzz-hours">
          <option value="24">過去24時間</option>
          <option value="48">過去48時間</option>
          <option value="168">過去7日</option>
          <option value="720">過去30日</option>
          <option value="2160">過去90日</option>
          <option value="4320" selected>過去6ヶ月</option>
          <option value="100000">全期間</option>
        </select>
        <select id="buzz-post-type" title="種類フィルタ">
          <option value="article_first" selected>X記事優先</option>
          <option value="article_only">X記事のみ</option>
          <option value="tweet_only">通常+長文のみ</option>
          <option value="all">すべて（imp順）</option>
        </select>
        <input id="buzz-keyword" type="text" placeholder="キーワード（任意）例: AI, 副業, 投資" />
        <input id="buzz-min-imp" type="number" value="10000" min="0" step="5000" title="最低インプレッション数" />
        <input id="buzz-limit" type="number" value="40" min="1" max="200" step="10" title="件数" />
        <button type="button" id="buzz-refresh">更新</button>
        <button type="button" class="close" data-modal-close="buzz" aria-label="閉じる">×</button>
      </div>
    </header>
    <div id="buzz-summary" class="buzz-summary"></div>
    <div id="buzz-list" class="buzz-list"></div>
  </div>
</div>


<script src="/static/app.js"></script>
</body>
</html>
